name: Build Mobile

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/mobile.yml"

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.x"
          channel: "stable"
      - name: Install dependencies
        run: flutter pub get
        working-directory: mobile
      - name: Analyze
        run: flutter analyze
        working-directory: mobile
      - name: Test
        run: flutter test
        working-directory: mobile
      - name: Build APK
        run: flutter build apk --dart-define=API_BASE_URL=${{ secrets.API_URL }}
        working-directory: mobile
