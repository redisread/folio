name: collect
description: Collect RSS Reader - A modern RSS reader for iOS and Android
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # 状态管理
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # 路由
  go_router: ^14.6.2

  # HTTP 客户端
  dio: ^5.7.0

  # 本地存储
  shared_preferences: ^2.3.3
  flutter_secure_storage: ^9.2.2

  # WebView（文章阅读）
  webview_flutter: ^4.10.0

  # 图片缓存
  cached_network_image: ^3.4.1

  # HTML 解析
  flutter_html: ^3.0.0-beta.2

  # 图标
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1

  # 时间处理
  timeago: ^3.7.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^2.6.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
